<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフクリーニング 納品書発行システム</title>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #e2e5ea;
    --primary: #2563a8;
    --primary-dark: #1a4a82;
    --primary-light: #dbeafe;
    --danger: #dc2626;
    --text: #1e2430;
    --text-sub: #6b7280;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Meiryo',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ログイン */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#1a4a82,#2563a8 50%,#0ea5a0); }
  .login-card { background:var(--surface); border-radius:16px; padding:40px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .login-logo { text-align:center; margin-bottom:28px; }
  .login-logo .company { font-size:12px; color:var(--text-sub); margin-bottom:4px; }
  .login-logo .title { font-size:18px; font-weight:700; color:var(--primary); line-height:1.4; }
  .login-logo .subtitle { font-size:11px; color:var(--text-sub); margin-top:2px; }
  hr.divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-sub); margin-bottom:6px; }
  .form-group input, .form-group select { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:inherit; color:var(--text); background:var(--surface); outline:none; transition:border-color .2s; }
  .form-group input:focus, .form-group select:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
  .btn-primary { width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .2s,transform .1s; }
  .btn-primary:hover { background:var(--primary-dark); }
  .btn-primary:active { transform:scale(.98); }
  .login-error { background:#fef2f2; border:1px solid #fecaca; color:var(--danger); padding:10px 12px; border-radius:var(--radius); font-size:13px; margin-top:12px; display:none; text-align:center; }

  /* メイン */
  #main-screen { display:none; }
  .header { background:var(--primary); color:#fff; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .header-title { font-size:15px; font-weight:700; }
  .header-actions { display:flex; align-items:center; gap:8px; }
  .header-btn { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:#fff; padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; transition:background .2s; }
  .header-btn:hover { background:rgba(255,255,255,0.25); }
  .tab-bar { background:var(--surface); border-bottom:2px solid var(--border); display:flex; padding:0 16px; overflow-x:auto; scrollbar-width:none; }
  .tab-bar::-webkit-scrollbar { display:none; }
  .tab-btn { padding:14px 18px; border:none; background:none; color:var(--text-sub); font-size:13px; font-family:inherit; cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .2s,border-color .2s; font-weight:500; }
  .tab-btn:hover { color:var(--primary); }
  .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }
  .tab-content { display:none; padding:20px; max-width:1000px; margin:0 auto; }
  .tab-content.active { display:block; }
  .placeholder { text-align:center; padding:60px 20px; color:var(--text-sub); }
  .placeholder .icon { font-size:40px; margin-bottom:12px; }
  .placeholder .text { font-size:15px; font-weight:600; margin-bottom:6px; }

  /* カード */
  .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:20px; margin-bottom:16px; box-shadow:var(--shadow); }
  .card-title { font-size:12px; font-weight:700; color:var(--text-sub); letter-spacing:.05em; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); text-transform:uppercase; }

  /* 伝票発行タブ */
  .slip-layout { display:grid; grid-template-columns:280px 1fr; gap:16px; align-items:start; }
  @media(max-width:700px){ .slip-layout { grid-template-columns:1fr; } }

  .customer-list { max-height:calc(100vh - 200px); overflow-y:auto; }
  .customer-btn { display:block; width:100%; text-align:left; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius); margin-bottom:6px; background:var(--surface); cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:var(--text); transition:all .15s; }
  .customer-btn:hover { border-color:var(--primary); background:var(--primary-light); }
  .customer-btn.active { border-color:var(--primary); background:var(--primary-light); color:var(--primary); font-weight:700; }
  .customer-btn .cycle-badge { font-size:10px; color:var(--text-sub); font-weight:400; margin-left:6px; }

  /* 入力エリア */
  .slip-header { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .input-sm { padding:8px 10px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:inherit; outline:none; transition:border-color .2s; width:100%; }
  .input-sm:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }

  /* 品目テーブル */
  .items-table { width:100%; border-collapse:collapse; font-size:13px; }
  .items-table th { background:var(--bg); padding:8px 10px; text-align:left; font-weight:600; font-size:12px; color:var(--text-sub); border-bottom:2px solid var(--border); }
  .items-table td { padding:6px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .items-table tr:last-child td { border-bottom:none; }
  .qty-input { width:80px; padding:6px 8px; border:1.5px solid var(--border); border-radius:6px; font-size:14px; text-align:right; font-family:inherit; outline:none; }
  .qty-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }
  .qty-input.has-value { border-color:var(--primary); background:var(--primary-light); font-weight:700; }

  /* がん研究センター */
  .cancer-table { width:100%; border-collapse:collapse; font-size:12px; }
  .cancer-table th, .cancer-table td { padding:6px 8px; border:1px solid var(--border); text-align:center; }
  .cancer-table th { background:var(--bg); font-weight:600; color:var(--text-sub); }
  .cancer-table td:first-child { text-align:left; font-weight:600; }
  .cancer-qty { width:60px; padding:4px 6px; border:1.5px solid var(--border); border-radius:4px; font-size:13px; text-align:right; font-family:inherit; outline:none; }
  .cancer-qty:focus { border-color:var(--primary); }
  .cancer-qty.has-value { border-color:var(--primary); background:var(--primary-light); font-weight:700; }

  /* 東戸塚カーテン */
  .curtain-row { display:grid; grid-template-columns:80px 80px 80px 40px auto; gap:8px; align-items:center; margin-bottom:8px; }
  .curtain-row input { padding:6px 8px; border:1.5px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; outline:none; text-align:right; }
  .curtain-row input:focus { border-color:var(--primary); }
  .btn-add-row { padding:6px 14px; background:none; border:1.5px dashed var(--border); border-radius:var(--radius); color:var(--text-sub); cursor:pointer; font-size:12px; font-family:inherit; transition:all .2s; }
  .btn-add-row:hover { border-color:var(--primary); color:var(--primary); }
  .btn-remove-row { background:none; border:none; color:#ccc; cursor:pointer; font-size:16px; padding:0 4px; }
  .btn-remove-row:hover { color:var(--danger); }

  /* 印刷ボタン */
  .print-bar { display:flex; align-items:center; justify-content:space-between; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
  .btn-print { padding:12px 32px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .2s; }
  .btn-print:hover { background:var(--primary-dark); }
  .btn-reset { padding:10px 20px; background:none; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; cursor:pointer; font-family:inherit; color:var(--text-sub); transition:all .2s; }
  .btn-reset:hover { border-color:var(--danger); color:var(--danger); }

  /* モーダル共通 */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:12px; padding:28px; width:440px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:20px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .btn-secondary { padding:9px 18px; background:none; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; cursor:pointer; font-family:inherit; color:var(--text); transition:background .2s; }
  .btn-secondary:hover { background:var(--bg); }

  /* ユーザー管理 */
  .user-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; background:var(--bg); }
  .user-item .user-name { font-weight:600; font-size:13px; }
  .user-item .user-role { font-size:11px; color:var(--text-sub); margin-top:2px; }
  .user-item-actions { display:flex; gap:6px; }
  .btn-icon { background:none; border:1px solid var(--border); cursor:pointer; color:var(--text-sub); padding:4px 8px; border-radius:4px; font-size:12px; font-family:inherit; }
  .btn-icon:hover { background:var(--border); }
  .btn-icon.danger:hover { background:#fef2f2; color:var(--danger); border-color:#fecaca; }
  .history-list { max-height:320px; overflow-y:auto; }
  .history-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .history-item:last-child { border-bottom:none; }
  .history-item .h-user { font-weight:600; }
  .history-item .h-time { color:var(--text-sub); font-size:12px; }

  /* トースト */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e2430; color:#fff; padding:12px 24px; border-radius:999px; font-size:13px; font-weight:500; z-index:300; transition:transform .3s; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ===== 印刷スタイル ===== */
  @media print {
    @page { size: B5 landscape; margin: 8mm; }
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: fixed; inset: 0; display: flex; gap: 0; }
    .print-slip { width: 50%; padding: 6mm; border-right: 1px dashed #999; font-size: 11px; }
    .print-slip:last-child { border-right: none; }
    .print-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4mm; }
    .print-title { font-size: 16px; font-weight: 900; }
    .print-customer { font-size: 14px; font-weight: 700; border-bottom: 2px solid #000; padding-bottom: 2mm; margin-bottom: 3mm; }
    .print-date { font-size: 11px; }
    .print-company { font-size: 10px; text-align: right; line-height: 1.6; }
    .print-table { width: 100%; border-collapse: collapse; }
    .print-table th { background: #f0f0f0; padding: 3px 6px; font-size: 10px; border: 1px solid #999; text-align: center; }
    .print-table td { padding: 3px 6px; border: 1px solid #ccc; font-size: 11px; }
    .print-table td.qty { text-align: right; font-weight: 700; }
    .print-table td.section-header { background: #e8e8e8; font-weight: 700; font-size: 10px; }
    .print-table tfoot td { border-top: 2px solid #000; font-weight: 700; }
    .print-label { font-size: 9px; color: #666; text-align: right; margin-top: 2mm; }
  }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="company">株式会社プゥル・ヴー ホワイト事業部</div>
      <div class="title">ライフクリーニング<br>納品書発行システム</div>
      <div class="subtitle">v2.0</div>
    </div>
    <hr class="divider">
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-password" placeholder="パスワードを入力" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="header">
    <div class="header-title">ライフクリーニング納品書</div>
    <div class="header-actions">
      <span style="font-size:12px;opacity:.85" id="header-user-label"></span>
      <button class="header-btn" onclick="openLoginHistory()">📋 ログイン履歴</button>
      <button class="header-btn" id="admin-btn" onclick="openAdminModal()" style="display:none">⚙ 管理設定</button>
      <button class="header-btn" onclick="doLogout()">🚪 ログアウト</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab-slip',this)">📋 伝票発行</button>
    <button class="tab-btn" onclick="switchTab('tab-master',this)">🗂 マスタ管理</button>
    <button class="tab-btn" onclick="switchTab('tab-history',this)">🕐 発行履歴</button>
    <button class="tab-btn" onclick="switchTab('tab-output',this)">📊 出力</button>
    <button class="tab-btn" onclick="switchTab('tab-backup',this)">💾 バックアップ</button>
    <button class="tab-btn" onclick="switchTab('tab-guide',this)">📖 使い方</button>
  </div>

  <!-- 伝票発行タブ -->
  <div id="tab-slip" class="tab-content active">
    <div class="slip-layout">
      <!-- 客先リスト -->
      <div class="card" style="padding:16px">
        <div class="card-title">得意先</div>
        <div class="customer-list" id="customer-list"></div>
      </div>
      <!-- 入力エリア -->
      <div id="slip-input-area">
        <div class="placeholder" id="slip-placeholder">
          <div class="icon">👈</div>
          <div class="text">得意先を選択してください</div>
        </div>
        <div id="slip-form" style="display:none">
          <div class="card">
            <div class="card-title" id="slip-customer-title"></div>
            <div class="slip-header">
              <div class="form-group" style="margin:0">
                <label>納品日</label>
                <input type="date" class="input-sm" id="slip-date">
              </div>
              <div class="form-group" style="margin:0">
                <label>伝票番号（任意）</label>
                <input type="text" class="input-sm" id="slip-no" placeholder="自動採番">
              </div>
            </div>
            <!-- 通常品目 -->
            <div id="slip-normal">
              <table class="items-table">
                <thead><tr><th>品目</th><th style="width:100px;text-align:right">数量</th></tr></thead>
                <tbody id="items-tbody"></tbody>
              </table>
            </div>
            <!-- がん研究センター -->
            <div id="slip-cancer" style="display:none">
              <div style="overflow-x:auto">
                <table class="cancer-table" id="cancer-table"></table>
              </div>
            </div>
            <!-- 東戸塚カーテン -->
            <div id="slip-curtain" style="display:none">
              <div style="display:grid;grid-template-columns:80px 80px 80px 40px auto;gap:8px;margin-bottom:6px;padding:0 4px">
                <span style="font-size:11px;color:var(--text-sub);font-weight:600">幅(cm)</span>
                <span style="font-size:11px;color:var(--text-sub);font-weight:600">丈(cm)</span>
                <span style="font-size:11px;color:var(--text-sub);font-weight:600">枚数</span>
                <span></span><span></span>
              </div>
              <div id="curtain-rows"></div>
              <button class="btn-add-row" onclick="addCurtainRow()">＋ 行を追加</button>
            </div>

            <div class="print-bar">
              <button class="btn-reset" onclick="resetSlip()">クリア</button>
              <button class="btn-print" onclick="doPrint()">🖨 印刷・発行</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 他タブ（後続Step） -->
  <div id="tab-master" class="tab-content">
    <div class="placeholder"><div class="icon">🗂</div><div class="text">マスタ管理</div><div style="font-size:12px;color:var(--text-sub);margin-top:6px">Step 3 で実装予定</div></div>
  </div>
  <div id="tab-history" class="tab-content">
    <div class="placeholder"><div class="icon">🕐</div><div class="text">発行履歴</div><div style="font-size:12px;color:var(--text-sub);margin-top:6px">Step 4 で実装予定</div></div>
  </div>
  <div id="tab-output" class="tab-content">
    <div class="placeholder"><div class="icon">📊</div><div class="text">出力</div><div style="font-size:12px;color:var(--text-sub);margin-top:6px">Step 4 で実装予定</div></div>
  </div>
  <div id="tab-backup" class="tab-content">
    <div class="placeholder"><div class="icon">💾</div><div class="text">バックアップ</div><div style="font-size:12px;color:var(--text-sub);margin-top:6px">Step 5 で実装予定</div></div>
  </div>
  <div id="tab-guide" class="tab-content">
    <div class="card"><div class="card-title">📖 使い方ガイド</div><p style="color:var(--text-sub);line-height:1.8">各タブの機能は順次実装予定です。</p></div>
  </div>
</div>

<!-- 印刷エリア（非表示） -->
<div id="print-area" style="display:none"></div>

<!-- 管理設定モーダル -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal" style="width:500px">
    <div class="modal-title">⚙ 管理設定</div>
    <div class="card-title">ユーザー管理</div>
    <div id="user-list" style="margin-bottom:16px"></div>
    <button class="btn-primary" style="width:auto;padding:8px 16px;font-size:13px" onclick="openAddUserModal()">＋ ユーザー追加</button>
    <div class="modal-actions"><button class="btn-secondary" onclick="closeModal('admin-modal')">閉じる</button></div>
  </div>
</div>

<!-- ユーザー追加モーダル -->
<div class="modal-overlay" id="add-user-modal">
  <div class="modal">
    <div class="modal-title">ユーザー追加</div>
    <div class="form-group"><label>ユーザー名</label><input type="text" id="new-user-name" placeholder="例：田中"></div>
    <div class="form-group"><label>パスワード</label><input type="password" id="new-user-pw"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('add-user-modal')">キャンセル</button>
      <button class="btn-primary" style="width:auto;padding:9px 20px" onclick="addUser()">追加</button>
    </div>
  </div>
</div>

<!-- PW変更モーダル -->
<div class="modal-overlay" id="change-pw-modal">
  <div class="modal">
    <div class="modal-title" id="change-pw-title">パスワード変更</div>
    <div class="form-group" id="old-pw-group"><label>現在のパスワード</label><input type="password" id="old-pw"></div>
    <div class="form-group"><label>新しいパスワード</label><input type="password" id="new-pw"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('change-pw-modal')">キャンセル</button>
      <button class="btn-primary" style="width:auto;padding:9px 20px" onclick="changePassword()">変更</button>
    </div>
  </div>
</div>

<!-- ログイン履歴モーダル -->
<div class="modal-overlay" id="login-history-modal">
  <div class="modal">
    <div class="modal-title">📋 ログイン履歴</div>
    <div class="history-list" id="login-history-list"></div>
    <div class="modal-actions"><button class="btn-secondary" onclick="closeModal('login-history-modal')">閉じる</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== データ定数 =====

function doLogin() {

  if (!user) { document.getElementById('login-error').style.display='block'; return; }

// ===== 客先リスト =====
let selectedCustomer = null;

function renderCustomerList() {
  const customers = loadData(KEYS.customers, []);
  const list = document.getElementById('customer-list');
  list.innerHTML = '';
  customers.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'customer-btn' + (selectedCustomer?.id===c.id ? ' active' : '');
    // サイクルバッジ
    let badge = '';
    if (c.cycle) {
      const days = c.cycle.split(',').map(d => CYCLE_LABEL[d.trim()] || d).join('・');
      badge = '<span class="cycle-badge">(' + days + ')</span>';
    }
    btn.innerHTML = c.name + badge;
    btn.onclick = () => selectCustomer(c);
    list.appendChild(btn);
  });
}

function selectCustomer(c) {
  selectedCustomer = c;
  renderCustomerList();
  document.getElementById('slip-placeholder').style.display='none';
  document.getElementById('slip-form').style.display='block';
  document.getElementById('slip-customer-title').textContent = c.name;

  // 納品日自動入力
  setAutoDate(c);

  // 入力エリア切り替え
  document.getElementById('slip-normal').style.display = 'none';
  document.getElementById('slip-cancer').style.display = 'none';
  document.getElementById('slip-curtain').style.display = 'none';

  if (c.type === 'cancer') {
    document.getElementById('slip-cancer').style.display = 'block';
    renderCancerTable(c);
  } else if (c.type === 'curtain') {
    document.getElementById('slip-curtain').style.display = 'block';
    renderCurtainRows();
  } else {
    document.getElementById('slip-normal').style.display = 'block';
    renderItemsTable(c);
  }
}

function setAutoDate(c) {
  const dateInput = document.getElementById('slip-date');
  if (dateInput.value) return; // すでに入力済みなら変えない
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  if (!c.cycle || c.cycle === '') {
    dateInput.value = todayStr;
    return;
  }
  if (c.cycle === 'today') {
    dateInput.value = todayStr;
    return;
  }

  const cycleDays = c.cycle.split(',').map(d => parseInt(d.trim())); // 1=月..7=日
  const todayDow = today.getDay() === 0 ? 7 : today.getDay(); // 1=月..7=日

  // 今日がサイクル日なら今日、そうでなければ次のサイクル日
  if (cycleDays.includes(todayDow)) {
    dateInput.value = todayStr;
  } else {
    // 次のサイクル日を探す
    let minDiff = 7;
    cycleDays.forEach(d => {
      let diff = d - todayDow;
      if (diff <= 0) diff += 7;
      if (diff < minDiff) minDiff = diff;
    });
    const next = new Date(today);
    next.setDate(today.getDate() + minDiff);
    dateInput.value = next.toISOString().slice(0,10);
  }
}

function renderItemsTable(c) {

  tbody.innerHTML = '';
  c.items.forEach((item, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${item}</td>
      <td style="text-align:right">
        <input type="number" class="qty-input" id="qty_${i}" min="0" placeholder="0"
          oninput="this.classList.toggle('has-value', this.value>0)">
      </td>`;
    tbody.appendChild(tr);
  });
}

// ===== がん研究センターテーブル =====
function renderCancerTable(c) {
  const g = c.group;
  const table = document.getElementById('cancer-table');
  const sections = g.sections; // ['14A','14B','16A','16B']
  const items = g.items;       // ['看護衣','ケーシー','作業衣上','作業衣下']

  let html = '<thead><tr><th>セクション</th>';
  items.forEach(it => { html += `<th>${it}</th>`; });
  html += '</tr></thead><tbody>';

  sections.forEach(sec => {
    html += `<tr><td>${sec}</td>`;
    items.forEach(it => {
      html += `<td><input type="number" class="cancer-qty" id="cq_${sec}_${it}" min="0" placeholder="0" oninput="this.classList.toggle('has-value',this.value>0)"></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function resetSlip() {

  document.getElementById('slip-no').value = '';
  if (selectedCustomer) {
    setAutoDate(selectedCustomer);
    if (selectedCustomer.type === 'cancer') {
      document.querySelectorAll('.cancer-qty').forEach(i => { i.value=''; i.classList.remove('has-value'); });
    } else if (selectedCustomer.type === 'curtain') {
      renderCurtainRows();
    } else {
      document.querySelectorAll('.qty-input').forEach(i => { i.value=''; i.classList.remove('has-value'); });
    }

// ===== 伝票番号 =====
function getNextSlipNo() {
  const n = (loadData(KEYS.slipNo, 0) || 0) + 1;
  saveData(KEYS.slipNo, n);
  return String(n).padStart(5, '0');
}

// ===== 日付フォーマット =====
function fmtDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

// ===== 印刷データ収集 =====
function collectPrintData() {
  const c = selectedCustomer;
  const date = document.getElementById('slip-date').value;
  const slipNo = document.getElementById('slip-no').value || getNextSlipNo();
  let rows = [];

  if (c.type === 'cancer') {
    const g = c.group;
    // セクションごとの行
    g.sections.forEach(sec => {
      g.items.forEach(it => {
        const el = document.getElementById(`cq_${sec}_${it}`);
        const qty = el ? parseInt(el.value)||0 : 0;
        if (qty > 0) rows.push({ label: `${sec}　${it}`, qty });
      });
    });
    // 品目ごとの合計行
    const totals = {};
    g.items.forEach(it => {
      let total = 0;
      g.sections.forEach(sec => {
        const el = document.getElementById(`cq_${sec}_${it}`);
        total += el ? parseInt(el.value)||0 : 0;
      });
      if (total > 0) totals[it] = total;
    });
    if (Object.keys(totals).length > 0) {
      rows.push({ label: '─────────', qty: null, isSep: true });
      Object.entries(totals).forEach(([it, qty]) => {
        rows.push({ label: `合計　${it}`, qty, isBold: true });
      });
    }
  } else if (c.type === 'curtain') {
    document.querySelectorAll('#curtain-rows .curtain-row').forEach(row => {
      const w = row.querySelector('.curtain-w').value;
      const h = row.querySelector('.curtain-h').value;
      const qty = parseInt(row.querySelector('.curtain-qty').value)||0;
      if (qty > 0 && w && h) {
        rows.push({ label: `${w}×${h}cm`, qty });
      }
    });
  } else {
    c.items.forEach((item, i) => {
      const qty = parseInt(document.getElementById(`qty_${i}`)?.value)||0;
      if (qty > 0) rows.push({ label: item, qty });
    });
  }

  return { customer: c.name, date, slipNo, rows };
}

// ===== 印刷 =====
function doPrint() {
  const data = collectPrintData();
  if (data.rows.filter(r=>!r.isSep).length === 0) {
    showToast('数量を入力してください');
    return;
  }

  const slipHtml = buildSlipHtml(data);
  const area = document.getElementById('print-area');
  area.style.display = 'flex';
  area.innerHTML = `
    <div class="print-slip">${slipHtml}<div class="print-label">納品書</div></div>
    <div class="print-slip">${slipHtml}<div class="print-label">控え</div></div>
  `;
  window.print();
  area.style.display = 'none';

  showToast('発行しました');
}

function buildSlipHtml(data) {
  const today = new Date();
  const issued = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  let rowsHtml = '';
  data.rows.forEach(r => {
    if (r.isSep) {
      rowsHtml += '<tr><td colspan="2" style="border:none;padding:2px 0;"></td></tr>';
    } else {
      rowsHtml += `<tr>
        <td style="${r.isBold?'font-weight:700':''}">${r.label}</td>
        <td class="qty">${r.qty}</td>
      </tr>`;
    }
  });

  return `
    <div class="print-header">
      <div>
        <div class="print-title">納 品 書</div>
        <div class="print-date">No. ${data.slipNo}</div>
      </div>
      <div class="print-company">
        株式会社プゥル・ヴー<br>ホワイト事業部<br>TEL: 045-000-0000
      </div>
    </div>
    <div class="print-customer">${data.customer} 御中</div>
    <div style="font-size:11px;margin-bottom:3mm">納品日：${fmtDate(data.date)}　発行：${issued}</div>
    <table class="print-table">
      <thead><tr><th>品　目</th><th>数量</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  `;
}

  renderUserList();
  closeModal('add-user-modal');
  showToast(name+' を追加しました');
}

function deleteUser(id) {
  if (!confirm('このユーザーを削除しますか？')) return;
  saveData(KEYS.users, loadData(KEYS.users,[]).filter(u=>u.id!==id));
  renderUserList();
  showToast('削除しました');
}

function openChangePwModal(userId, userName) {
  changePwTargetId = userId;
  document.getElementById('change-pw-title').textContent =
    userId===currentUser.id ? 'パスワード変更' : userName+' のパスワード変更';
  document.getElementById('old-pw').value='';
  document.getElementById('new-pw').value='';
  document.getElementById('old-pw-group').style.display =
    (currentUser.role==='admin' && userId!==currentUser.id) ? 'none' : '';
  document.getElementById('change-pw-modal').classList.add('open');
}

function changePassword() {
  const newPw = document.getElementById('new-pw').value;
  if (!newPw) { showToast('新しいパスワードを入力してください'); return; }
  const users = loadData(KEYS.users,[]);
  if (users.find(u=>u.id!==changePwTargetId && u.password===newPw)) {
    showToast('そのパスワードはすでに使われています'); return;
  }
  const idx = users.findIndex(u=>u.id===changePwTargetId);
  const isSelf = changePwTargetId===currentUser.id;
  if (isSelf || currentUser.role!=='admin') {
    if (users[idx].password !== document.getElementById('old-pw').value) {
      showToast('現在のパスワードが違います'); return;
    }
  }
  users[idx].password = newPw;
  if (isSelf) currentUser.password = newPw;
  saveData(KEYS.users, users);
  renderUserList();
  closeModal('change-pw-modal');
  showToast('パスワードを変更しました');
}

// ===== ログイン履歴 =====
function openLoginHistory() {
  const history = loadData(KEYS.loginHistory, []);
  const list = document.getElementById('login-history-list');
  if (!history.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:24px">履歴がありません</div>';
  } else {
    list.innerHTML = history.map(h => {
      const d = new Date(h.time);
      const fmt = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="history-item"><span class="h-user">${h.user}</span><span class="h-time">${fmt}</span></div>`;
    }).join('');
  }
  document.getElementById('login-history-modal').classList.add('open');
}

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ===== 起動 =====
initData();
</script>
</body>
</html>
